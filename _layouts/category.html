---
layout: default
---
<ul class="posts-list">
  
  <div>
    <h1>
      {{ page.title }}
    </h1>
  </div>
  
  {% assign category = page.category | default: page.title %}
  {% for post in site.categories[category] %}
    <li>
      <h3>
        <a href="{{ site.baseurl }}{{ post.url | relative_url }}">
          {{ post.title }}
        </a>
        <small>{{ post.date | date_to_string }}</small>
      </h3>
      <hr>
    </li>
  {% endfor %}
  
</ul>
