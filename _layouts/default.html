<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  {% include head.html %}
</head>
<body>
  <!-- <nav class="breadcrumb">
    <a href="{{ site.baseurl }}/">Home</a> &gt; 
      <a href="{{ site.baseurl }}/categories/{{ page.categories | first | slugify }}/">
      {{ page.categories | first }}
    </a>
  </nav> -->

  <div style="display: flex;">

    <!-- 사이드바 -->
    <div style="width: 250px; padding: 20px; background: #f0f0f0;">

      <a href="{{ site.baseurl }}/">홈으로 돌아가기</a>
      <h3>📂 Categories</h3>
      <ul>
        {% for category in site.categories %}
          <li>
            <a href="{{ site.baseurl }}/categories/{{ category[0] | slugify }}/">{{ category[0] }}</a>
          </li>
        {% endfor %}
      </ul>

      <h3>📝 Recent Posts</h3>
      <ul>
        {% for post in site.posts limit:5 %}
          <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </div>

    <!-- 메인 콘텐츠 -->
    <div style="flex: 1; padding: 20px;">
      {{ content }}
    </div>

  </div>

</body>
</html>
